<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はるよよスタジオ</title>
    <style>
        /* DAW風ダークモードデザイン */
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #00d1ff;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* パスワード画面 */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        input[type="password"] {
            background: #2a2a2a;
            border: 1px solid var(--accent-color);
            color: white;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* メインコンテンツ（初期は非表示） */
        #main-content {
            display: none;
            width: 90%;
            max-width: 800px;
            padding: 40px 0;
        }

        h1 {
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        /* 楽曲カード */
        .track-card {
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .track-header {
            padding: 15px 20px;
            background: #252525;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .track-title {
            font-weight: bold;
            color: var(--accent-color);
        }

        video {
            width: 100%;
            display: block;
            background: #000;
        }

        /* アコーディオン（歌詞） */
        .lyrics-btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .lyrics-btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        .lyrics-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: #181818;
        }

        .lyrics-inner {
            padding: 20px;
            line-height: 1.8;
            white-space: pre-wrap; /* 改行を反映 */
            font-size: 0.9rem;
            color: #bbb;
        }
    </style>
</head>
<body>

    <!-- パスワード入力エリア -->
    <div id="auth-overlay">
        <h2 style="color: var(--accent-color)">はるよよスタジオへようこそ！</h2>
        <input type="password" id="pass-input" placeholder="パスワードを入力してね" oninput="checkPassword(this.value)">
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content">
        <h1>どれを聴く？</h1>
        <div id="track-list">
            <!-- JSでここに曲が追加されます -->
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 曲データの管理（ここを編集して追加）
        // ==========================================
        const SONGS = [
            {
                title: "夜更かしとブルーライト",
                videoSrc: "夜更かしとブルーライト _ 初音ミクV6.mp4", // mp4ファイルのパス
                lyrics: "真夜中に点滅するブルーライト指先は泳いでる画面の向こうの嘘飲みかけたキャラメルは甘くてぬるくてもういいや間違えて夢を捨てないようにポツリ、ポツリ、ポツリ、雨音みたいに夜の静寂に落ちていったねぇ誰か気づいてよでも、見つけないで更新ボタンをなぞるたび削られていく安らぎと癒しの時間ハートの数だけで評価が決められていくそれさえもアルゴリズムチクリ、チクリ、チクリ、胸の奥刺さったままの本音がまだ震えてるねぇ誰か気づいてよでも、何も言わないでブルーライトは充電されたまま思考の回路は何かを欲しているだんだん朝日が世界を照らしだして寝つけないポンコツをカラスが笑いだしたポツリ、ポツリ、ポツリ、雨音みたいに夜の静寂に落ちていったねぇ誰か愛してよ夜更かしと点滅するブルーライトこんな生活繰り返す今日もまた何か探してる飲みかけたキャラメルは甘くてぬるいけどいいや飲み干して夢をみよう"
            },
            {
                title: "acoustic",
                videoSrc: "acoustic _ 音街ウナ.mp4", // mp4ファイルのパス
                lyrics: "あのねギターを弾いてみたいの私ロックに憧れているのあなたはかっこいいメロディ青いギターをゆびで鳴らすのふたりの世界あなたはコーヒーが飲めないダサいジュースで乾杯今夜の月は綺麗ですねちょっと泣いてる私抱きしめたあなたの匂いで落ちていくわ私星の音と雨で溢れそうなのあのねギターを弾いてみたいと私あなたにお願いしたのあなたは優しく笑って青いギターをゆびで鳴らすのふたりの音が夜を奏でて可愛いあなたぎゅってしてみた今夜の月は綺麗ですねちょっとびっくりあなた声出したあなたのメロディ酔いしれてく私心の深いところ溶けて溢れそうあのねギターを弾いてみたいの私あなたに憧れているのあなたはかっこいいメロディ青いギターをゆびで鳴らすの世界がふたり忘れたように太陽も朝もこない気がしてこのままずっとこのままと私だれに願えばいいのかな愛より恋よりあなたがいい大好き大好きとまらない今夜の月は綺麗ですねずっと一緒にいようねずっと一緒にいようね"
            },
           {
                title: "恋のロマンスドーン",
                videoSrc: "恋のロマンスドーン _ 音街ウナ.mp4", // mp4ファイルのパス
                lyrics: "この世界をあなたと一周旅行できたらふたりで見つけたいなひとつなぎの大秘宝富名声　力とあなた全部手に入れたいの私不思議な能力は持ってないけれどどんなときでも笑顔で明るいあなたはまるであの主人公腕とか脚とかは伸びたりしないけど命に換えても叶えたい夢とかそんなのないけど私はあなたに命に換えても守られるヒロインになりたいの自由なやつがこの海で一番って彼はいってるけど私はあなたの一番にただなりたいだけなのありったけの夢はないからさありったけの愛を私にください夢冒険ロマンとあなた全部味わいたいの私羅針盤なんて渋滞しちゃうけどいつでもどこかで道に迷ってるあなたはまるであの剣豪さすがに刀はくわえてないけれど涙を流して助けてなんて背負うような過去もないけど私はあなたの全てを信じる恋はいつでもハリケーンなのじゃ誰かに助けてもらわなきゃ生きていけねェ自信があるなら私をあなたの将来のクルーにさせてねポケットにロマンを詰め込んで捜し物を捜しに一緒にいこうね8千人の部下がいるってくだらないウソで笑わせてぐるぐる眉毛のプリンスみたいにクソうめェごはん食べさせてなんて彼らには敵わないけど恋のロマンスドーンと叶えてもしもあなたが悲しくて泣きたいようなしみったれた夜は私が万能薬になる自意識過剰に私も一緒に連れてってあなたと新時代これからも生きたいこの世界をあなたと一周旅行できたらふたりの見つかるかなひとつなぎの大秘宝"
            },
             {
                title: "鳴き声に夢を託し",
                videoSrc: "鳴き声に夢を託し _ 音街ウナ.mp4", // mp4ファイルのパス
                lyrics: "眠れない夜に猫が鳴いた月の光があたしを照らすこんなさみしい夜なんていっそ無くなっちゃえばいいあの人は今なにしてるだろう誰かと電話でもしてるかなあたしと少し今日話したことなんて忘れちゃったかな鳴き声に夢を託しきっといつの日にかはあたしの膝で眠る猫のように愛し合えたら静けさだけが部屋を包んでやがて東の空が白みはじめるあたしは未だベッドの中であの人を想ってるコーヒーの苦い味で目が覚め昨日の夢と現実を分ける眠れなかった理由は一つだけ誰の夢を見てたのかな鳴き声に夢を託しきっといつの日にかは新しい朝の光の中で愛し合えたらカーテンを開けた窓の外は昨日と変わらぬ街の景色だけどあたしの胸の奥はなんだかそわそわ落ち着かないのこれが恋なの？淡い光に願いを込めたきっと今日なら何か変わるような気がしてメイクを直す指先が震えているのに気づいた着替える前に鏡を見たの少しだけ伸びた髪の先をほんの少しだけ切ってみたら気づいてくれるかな"
            },
            // 以降、コピーして増やせます
        ];

        // ==========================================
        // 2. パスワード認証機能
        // ==========================================
        function checkPassword(value) {
            const SECRET = "8644";
            if (value === SECRET) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                renderSongs();
            }
        }

        // ==========================================
        // 3. 楽曲リストの描画
        // ==========================================
        function renderSongs() {
            const list = document.getElementById('track-list');
            
            SONGS.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                
                card.innerHTML = `
                    <div class="track-header">
                        <span class="track-title">TRACK ${index + 1}: ${song.title}</span>
                        <button class="lyrics-btn" onclick="toggleLyrics(${index})">LYRICS</button>
                    </div>
                    <video controls>
                        <source src="${song.videoSrc}" type="video/mp4">
                        お使いのブラウザは動画再生に対応していません。
                    </video>
                    <div id="lyrics-${index}" class="lyrics-content">
                        <div class="lyrics-inner">${song.lyrics}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // アコーディオンの開閉
        function toggleLyrics(index) {
            const content = document.getElementById(`lyrics-${index}`);
            if (content.style.maxHeight) {
                content.style.maxHeight = null;
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
            }
        }
    </script>
</body>
</html>
